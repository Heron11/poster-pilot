<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster Pilot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <img src="combined.png" alt="Poster Pilot" class="header-logo">
            </div>
        </header>
        
        <div class="content-wrapper">
            <div class="parameters-panel">
                
                <div class="parameters-content">
                    <div class="parameter-group">
                        <label for="businessName">Business Name</label>
                        <input type="text" id="businessName" placeholder="Business name">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="eventName">Event Name</label>
                        <input type="text" id="eventName" placeholder="Event name">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="eventDate">Event Date</label>
                        <input type="date" id="eventDate">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="eventTime">Event Time</label>
                        <input type="time" id="eventTime">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="eventLocation">Event Location</label>
                        <input type="text" id="eventLocation" placeholder="Event location">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="designStyle">Design Style</label>
                        <select id="designStyle">
                            <option value="">Select a style</option>
                            <option value="modern">Modern</option>
                            <option value="vintage">Vintage</option>
                            <option value="minimalist">Minimalist</option>
                            <option value="bold">Bold & Energetic</option>
                            <option value="elegant">Elegant</option>
                            <option value="playful">Playful</option>
                            <option value="professional">Professional</option>
                        </select>
                    </div>
                    
                    <div class="parameter-group">
                        <label for="colorScheme">Color Scheme</label>
                        <input type="text" id="colorScheme" placeholder="Color scheme">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="additionalDetails">Additional Details</label>
                        <input type="text" id="additionalDetails" placeholder="Details...">
                    </div>
                </div>
            </div>
            
            <button id="generateWithParams" class="generate-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
                Generate with Parameters
            </button>
            
        </div>
    </div>
    
    <!-- Overlay for loading and results -->
    <div id="overlay" class="overlay">
        <div class="overlay-content">
            <div id="overlayLoading" class="overlay-loading">
                <div class="overlay-header">
                    <h3>Generating Your Poster</h3>
                    <p>Creating your custom poster with AI...</p>
                </div>
                <div class="overlay-spinner"></div>
                <div class="overlay-progress">
                    <div id="progressBar" class="overlay-progress-bar"></div>
                </div>
                <p id="progressText">Initializing...</p>
            </div>
            
            <div id="overlaySuccess" class="overlay-success hidden">
                <div class="overlay-header">
                    <div class="success-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                            <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <h3>Poster Generated Successfully!</h3>
                    <p>Your image is ready for Zapier integration.</p>
                </div>
                
                <div class="image-url-container">
                    <label for="overlayImageUrlInput">Image URL for Zapier:</label>
                    <div class="url-input-group">
                        <input type="text" id="overlayImageUrlInput" readonly class="url-input">
                        <button id="overlayCopyUrlBtn" class="copy-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"/>
                            </svg>
                            Copy URL
                        </button>
                    </div>
                </div>
                
                <div class="overlay-actions">
                    <button id="overlayDownloadBtn" class="action-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M21 15V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="7,10 12,15 17,10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Download Image
                    </button>
                    <button id="overlayRegenerateBtn" class="action-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M1 4V10H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M23 20V14H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14L18.36 18.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Regenerate
                    </button>
                    <button id="overlayCloseBtn" class="action-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Close
                    </button>
                </div>
            </div>
            
            <div id="overlayError" class="overlay-error hidden">
                <div class="overlay-header">
                    <div class="error-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                            <line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2"/>
                            <line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <h3>Generation Failed</h3>
                    <p id="overlayErrorText">Something went wrong while generating your poster.</p>
                </div>
                
                <div class="overlay-actions">
                    <button id="overlayRetryBtn" class="action-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M1 4V10H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M23 20V14H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14L18.36 18.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Try Again
                    </button>
                    <button id="overlayCloseErrorBtn" class="action-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
