<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>AI Image Generator</h1>
            <p>Powered by GPT Image 1</p>
        </header>
        
        <div class="content-wrapper">
            <main class="main-content">
                <div class="input-section">
                    <div class="input-container">
                        <textarea 
                            id="promptInput" 
                            placeholder="Describe the image you want to generate..."
                            rows="3"
                        ></textarea>
                        <button id="generateBtn" class="generate-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                            </svg>
                            Generate Image
                        </button>
                    </div>
                </div>
            
                <div class="results-section">
                    <div id="loadingIndicator" class="loading hidden">
                        <div class="spinner"></div>
                        <p>Generating your image...</p>
                    </div>
                    
                    <div id="errorMessage" class="error hidden">
                        <p id="errorText"></p>
                    </div>
                    
                    <div id="imageContainer" class="image-container hidden">
                        <img id="generatedImage" alt="Generated image">
                        <div class="image-actions">
                            <button id="downloadBtn" class="action-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                    <path d="M21 15V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <polyline points="7,10 12,15 17,10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                                Download
                            </button>
                            <button id="regenerateBtn" class="action-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                    <path d="M1 4V10H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M23 20V14H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14L18.36 18.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                Regenerate
                            </button>
                        </div>
                    </div>
                </div>
            </main>
            
            <aside class="parameters-panel">
                <div class="parameters-header">
                    <h3>Parameters</h3>
                    <p>Customize your image generation</p>
                </div>
                
                <div class="parameters-content">
                    <div class="parameter-group">
                        <label for="businessName">Business Name</label>
                        <input type="text" id="businessName" placeholder="e.g., Maxi's Pizza Bar">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="eventName">Event Name</label>
                        <input type="text" id="eventName" placeholder="e.g., Philadelphia Eagles Game Watch Party">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="eventDate">Event Date</label>
                        <input type="date" id="eventDate">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="eventTime">Event Time</label>
                        <input type="time" id="eventTime">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="eventLocation">Event Location</label>
                        <input type="text" id="eventLocation" placeholder="e.g., 123 Main Street, Philadelphia, PA">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="designStyle">Design Style</label>
                        <select id="designStyle">
                            <option value="">Select a style</option>
                            <option value="modern">Modern</option>
                            <option value="vintage">Vintage</option>
                            <option value="minimalist">Minimalist</option>
                            <option value="bold">Bold & Energetic</option>
                            <option value="elegant">Elegant</option>
                            <option value="playful">Playful</option>
                            <option value="professional">Professional</option>
                        </select>
                    </div>
                    
                    <div class="parameter-group">
                        <label for="colorScheme">Color Scheme</label>
                        <input type="text" id="colorScheme" placeholder="e.g., reds, greens, golds">
                    </div>
                    
                    <div class="parameter-group">
                        <label for="additionalDetails">Additional Details</label>
                        <textarea id="additionalDetails" placeholder="Any specific elements, themes, or requirements..." rows="3"></textarea>
                    </div>
                    
                    <button id="generateWithParams" class="generate-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        </svg>
                        Generate with Parameters
                    </button>
                </div>
            </aside>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
